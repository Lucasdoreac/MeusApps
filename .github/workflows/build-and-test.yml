name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore test project
        run: dotnet restore matrix.Tests/matrix.Tests.csproj

      - name: Run tests
        run: dotnet test matrix.Tests/matrix.Tests.csproj --logger "trx;LogFileName=results.trx" --results-directory TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/

  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Build
        run: dotnet build matrix/matrix.csproj -f net10.0-windows10.0.19041.0 -c Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrix-windows
          path: matrix/bin/Release/net10.0-windows10.0.19041.0/win-x64/
